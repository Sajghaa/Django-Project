{% extends 'comments/base.html' %}

{% block title %}Report Comment{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-warning text-white">
                <h3 class="mb-0"><i class="fas fa-flag"></i> Report Comment</h3>
            </div>
            <div class="card-body">
                <div class="alert alert-secondary mb-3">
                    <strong>Comment by {{ comment.author.username }}:</strong>
                    <p class="mb-0 mt-1">{{ comment.content|truncatewords:30 }}</p>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Reason for reporting</label>
                        <select name="reason" class="form-control" required>
                            <option value="">Select a reason</option>
                            <option value="spam">Spam or advertising</option>
                            <option value="offensive">Offensive language</option>
                            <option value="harassment">Harassment or bullying</option>
                            <option value="hate_speech">Hate speech</option>
                            <option value="misinformation">Misinformation</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Additional details (optional)</label>
                        <textarea name="details" class="form-control" rows="3" placeholder="Please provide more details..."></textarea>
                    </div>
                    
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle"></i> Your report will be reviewed by a moderator.
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'comments:comment_detail' comment.id %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-warning">Submit Report</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
