{% extends 'comments/base.html' %}

{% block title %}Delete Comment{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0"><i class="fas fa-exclamation-triangle"></i> Delete Comment</h3>
            </div>
            <div class="card-body text-center">
                <i class="fas fa-trash-alt fa-4x text-danger mb-3"></i>
                <h4>Are you sure you want to delete this comment?</h4>
                
                <div class="alert alert-secondary text-start mt-3">
                    <strong>Comment:</strong>
                    <p class="mb-0">{{ comment.content|truncatewords:30 }}</p>
                </div>
                
                <p class="text-muted">This action cannot be undone.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{{ comment.content_object.get_absolute_url }}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-trash"></i> Yes, Delete
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
