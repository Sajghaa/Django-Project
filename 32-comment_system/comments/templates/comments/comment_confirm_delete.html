{% extends 'comments/base.html' %}

{% block title %}Delete Comment{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0"><i class="fas fa-trash"></i> Delete Comment</h3>
            </div>
            <div class="card-body text-center">
                <i class="fas fa-exclamation-triangle fa-4x text-warning mb-3"></i>
                <h4>Are you sure you want to delete this comment?</h4>
                <div class="alert alert-secondary text-start mt-3">
                    <strong>Comment:</strong>
                    <p class="mb-0 mt-1">{{ comment.content|truncatewords:30 }}</p>
                </div>
                <p class="text-danger">This action cannot be undone!</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'comments:comment_detail' comment.id %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
