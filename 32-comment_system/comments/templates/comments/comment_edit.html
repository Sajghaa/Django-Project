{% extends 'comments/base.html' %}

{% block title %}Edit Comment{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-warning text-white">
                <h3 class="mb-0"><i class="fas fa-edit"></i> Edit Comment</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Original Comment</label>
                        <div class="alert alert-secondary">
                            {{ comment.content|linebreaks }}
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Edit Comment</label>
                        <textarea name="content" class="form-control" rows="5" required>{{ comment.content }}</textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'comments:comment_detail' comment.id %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Update Comment</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
