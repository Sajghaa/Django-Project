<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Processor - Upload, Resize, Filter</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-800 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-gray-900/80 backdrop-blur-md border-b border-gray-700 sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-image text-3xl text-purple-400"></i>
                    <span class="text-xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                        ImageProcessor
                    </span>
                </div>
                <div id="authButtons" class="flex space-x-3">
                    <button id="loginBtn" class="px-4 py-2 rounded-lg bg-purple-600 hover:bg-purple-700 transition">
                        Login
                    </button>
                    <button id="registerBtn" class="px-4 py-2 rounded-lg border border-purple-400 text-purple-400 hover:bg-purple-600/20 transition">
                        Register
                    </button>
                </div>
                <div id="userMenu" class="hidden flex items-center space-x-4">
                    <span id="username" class="text-gray-300"></span>
                    <button id="logoutBtn" class="px-4 py-2 rounded-lg bg-red-600/20 text-red-400 hover:bg-red-600/30 transition">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-8">
        <div id="content">
            <!-- Home Page Content -->
            <div id="homePage">
                <div class="text-center mb-12">
                    <h1 class="text-5xl font-bold mb-4 bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                        Image Processor
                    </h1>
                    <p class="text-gray-400 text-lg">Upload, resize, filter, and transform your images instantly</p>
                </div>

                <!-- Upload Section -->
                <div class="max-w-2xl mx-auto mb-12">
                    <div class="border-2 border-dashed border-gray-600 rounded-2xl p-8 text-center hover:border-purple-400 transition cursor-pointer" id="dropZone">
                        <i class="fas fa-cloud-upload-alt text-5xl text-gray-500 mb-4"></i>
                        <p class="text-gray-400 mb-2">Drag & drop your image here or click to browse</p>
                        <p class="text-gray-500 text-sm">Supports: JPG, PNG, GIF, WEBP (Max 10MB)</p>
                        <input type="file" id="fileInput" class="hidden" accept="image/jpeg,image/png,image/gif,image/webp">
                        <button id="browseBtn" class="mt-4 px-6 py-2 bg-purple-600 rounded-lg hover:bg-purple-700 transition">
                            Browse Files
                        </button>
                    </div>
                </div>

                <!-- Processing Options -->
                <div id="processingOptions" class="hidden max-w-4xl mx-auto">
                    <div class="bg-gray-800/50 rounded-2xl p-6 mb-6">
                        <h3 class="text-xl font-semibold mb-4">Processing Options</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- Resize Options -->
                            <div>
                                <label class="block text-sm font-medium mb-2">Resize</label>
                                <div class="space-y-3">
                                    <div class="flex space-x-3">
                                        <input type="number" id="resizeWidth" placeholder="Width" class="flex-1 px-3 py-2 bg-gray-700 rounded-lg border border-gray-600 focus:border-purple-400 focus:outline-none">
                                        <input type="number" id="resizeHeight" placeholder="Height" class="flex-1 px-3 py-2 bg-gray-700 rounded-lg border border-gray-600 focus:border-purple-400 focus:outline-none">
                                    </div>
                                    <label class="flex items-center space-x-2">
                                        <input type="checkbox" id="maintainAspect" class="form-checkbox text-purple-500" checked>
                                        <span class="text-sm text-gray-400">Maintain aspect ratio</span>
                                    </label>
                                    <div>
                                        <label class="block text-sm mb-1">Quality: <span id="qualityValue">85</span>%</label>
                                        <input type="range" id="quality" min="1" max="100" value="85" class="w-full">
                                    </div>
                                </div>
                            </div>

                            <!-- Filters -->
                            <div>
                                <label class="block text-sm font-medium mb-2">Filters</label>
                                <div class="grid grid-cols-2 gap-2">
                                    <button data-filter="grayscale" class="filter-btn px-3 py-2 bg-gray-700 rounded-lg hover:bg-gray-600 transition">
                                        Grayscale
                                    </button>
                                    <button data-filter="blur" class="filter-btn px-3 py-2 bg-gray-700 rounded-lg hover:bg-gray-600 transition">
                                        Blur
                                    </button>
                                    <button data-filter="sharpen" class="filter-btn px-3 py-2 bg-gray-700 rounded-lg hover:bg-gray-600 transition">
                                        Sharpen
                                    </button>
                                    <button data-filter="sepia" class="filter-btn px-3 py-2 bg-gray-700 rounded-lg hover:bg-gray-600 transition">
                                        Sepia
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Additional Options -->
                        <div class="mt-6 pt-6 border-t border-gray-700">
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div>
                                    <label class="block text-sm mb-1">Rotate</label>
                                    <div class="flex space-x-2">
                                        <button data-rotate="90" class="rotate-btn px-3 py-2 bg-gray-700 rounded-lg hover:bg-gray-600 transition">90°</button>
                                        <button data-rotate="180" class="rotate-btn px-3 py-2 bg-gray-700 rounded-lg hover:bg-gray-600 transition">180°</button>
                                        <button data-rotate="270" class="rotate-btn px-3 py-2 bg-gray-700 rounded-lg hover:bg-gray-600 transition">270°</button>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-sm mb-1">Flip</label>
                                    <div class="flex space-x-2">
                                        <button data-flip="horizontal" class="flip-btn px-3 py-2 bg-gray-700 rounded-lg hover:bg-gray-600 transition">Horizontal</button>
                                        <button data-flip="vertical" class="flip-btn px-3 py-2 bg-gray-700 rounded-lg hover:bg-gray-600 transition">Vertical</button>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-sm mb-1">Generate Thumbnails</label>
                                    <label class="flex items-center space-x-2">
                                        <input type="checkbox" id="generateThumbnails" class="form-checkbox text-purple-500">
                                        <span class="text-sm text-gray-400">Auto-generate thumbnails (150x150, 320x240, 640x480)</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="mt-6">
                            <button id="processBtn" class="w-full px-6 py-3 bg-purple-600 rounded-lg hover:bg-purple-700 transition font-semibold">
                                <i class="fas fa-magic mr-2"></i>Process Image
                            </button>
                        </div>
                    </div>

                    <!-- Preview Section -->
                    <div class="bg-gray-800/50 rounded-2xl p-6">
                        <h3 class="text-xl font-semibold mb-4">Preview</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <p class="text-sm text-gray-400 mb-2">Original</p>
                                <img id="originalPreview" class="rounded-lg max-w-full h-auto" alt="Original">
                            </div>
                            <div>
                                <p class="text-sm text-gray-400 mb-2">Processed</p>
                                <img id="processedPreview" class="rounded-lg max-w-full h-auto" alt="Processed">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- My Images Gallery -->
                <div id="myImagesSection" class="hidden mt-12">
                    <h2 class="text-2xl font-bold mb-6">My Images</h2>
                    <div id="imagesGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                        <!-- Images will be loaded here -->
                    </div>
                </div>
            </div>

            <!-- Login/Register Modal -->
            <div id="authModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50">
                <div class="bg-gray-800 rounded-2xl w-full max-w-md p-6 relative">
                    <button id="closeModal" class="absolute top-4 right-4 text-gray-400 hover:text-white">
                        <i class="fas fa-times"></i>
                    </button>
                    <div id="authForms">
                        <!-- Login/Register forms loaded here -->
                    </div>
                </div>
            </div>

            <!-- Loading Overlay -->
            <div id="loadingOverlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden items-center justify-center z-50">
                <div class="text-center">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
                    <p class="text-white">Processing your image...</p>
                </div>
            </div>
        </div>
    </main>

    <style>
        .loader {
            border-top-color: #a855f7;
            animation: spinner 1s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #dropZone.drag-over {
            border-color: #a855f7;
            background-color: rgba(168, 85, 247, 0.1);
        }
    </style>

    <script src="js/api.js"></script>
    <script src="js/upload.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
