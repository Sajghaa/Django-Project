{% extends 'blog/base.html' %}

{% block title %}Delete Post - DjangoBlog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0"><i class="fas fa-exclamation-triangle"></i> Delete Post</h3>
            </div>
            <div class="card-body text-center">
                <i class="fas fa-trash-alt fa-4x text-danger mb-3"></i>
                <h4>Are you sure you want to delete "{{ post.title }}"?</h4>
                <p class="text-muted">This action cannot be undone. All comments and likes will also be deleted.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'blog:post_detail' post.slug %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
