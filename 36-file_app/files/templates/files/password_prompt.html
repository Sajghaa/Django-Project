{% extends 'files/base.html' %}

{% block title %}Password Required - FileShare{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-warning text-white">
                <h3 class="mb-0"><i class="fas fa-lock"></i> Password Required</h3>
            </div>
            <div class="card-body text-center">
                <i class="fas fa-file-pdf fa-4x text-primary mb-3"></i>
                <h4>{{ file.title|default:file.original_name }}</h4>
                <p class="text-muted">This file is password protected</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.password }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-unlock-alt"></i> Unlock & Download
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
