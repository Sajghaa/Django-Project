{% extends 'movies/base.html' %}

{% block title %}Delete Movie{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-danger text-white">
                    <h3 class="mb-0 text-center"><i class="fas fa-trash"></i> Delete Movie</h3>
                </div>
                <div class="card-body text-center">
                    <i class="fas fa-exclamation-triangle fa-4x text-warning mb-3"></i>
                    <h4>Are you sure you want to delete "{{ movie.title }}"?</h4>
                    <p class="text-muted">This action cannot be undone!</p>
                    <div class="alert alert-danger">
                        <i class="fas fa-info-circle"></i> All reviews and ratings for this movie will also be deleted.
                    </div>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-3">
                            <a href="{% url 'movies:movie_detail' movie.slug %}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-trash"></i> Yes, Delete
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
