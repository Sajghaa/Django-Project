{% extends 'shortener/base.html' %}

{% block title %}Password Protected - URL Shortener{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header bg-warning text-white">
                <h3 class="mb-0"><i class="fas fa-lock"></i> Password Required</h3>
            </div>
            <div class="card-body text-center">
                <i class="fas fa-shield-alt fa-4x text-warning mb-3"></i>
                <h4>This link is password protected</h4>
                <p class="text-muted">Please enter the password to continue</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.password }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-unlock-alt"></i> Unlock & Continue
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
