{% extends 'budget/base.html' %}
{% load budget_extras %}

{% block title %}Reports - BudgetApp{% endblock %}

{% block content %}
<!-- Keep the same content but update the JavaScript section -->

<script>
// Monthly Report Chart
const monthlySummary = {{ monthly_summary|safe }};

const monthlyCtx = document.getElementById('monthlyReportChart').getContext('2d');
const monthlyReportChart = new Chart(monthlyCtx, {
    type: 'line',
    data: {
        labels: monthlySummary.map(item => item.month),
        datasets: [
            {
                label: 'Income',
                data: monthlySummary.map(item => item.income),
                borderColor: '#28a745',
                backgroundColor: 'rgba(40, 167, 69, 0.1)',
                tension: 0.4,
                fill: true
            },
            {
                label: 'Expenses',
                data: monthlySummary.map(item => item.expenses),
                borderColor: '#dc3545',
                backgroundColor: 'rgba(220, 53, 69, 0.1)',
                tension: 0.4,
                fill: true
            },
            {
                label: 'Savings',
                data: monthlySummary.map(item => item.savings),
                borderColor: '#007bff',
                backgroundColor: 'rgba(0, 123, 255, 0.1)',
                tension: 0.4,
                fill: true
            }
        ]
    },
    options: {
        responsive: true,
        maintainAspectRatio: true,
        scales: {
            y: {
                beginAtZero: true,
                ticks: {
                    callback: function(value) {
                        return '$' + value;
                    }
                }
            }
        }
    }
});

// Category Breakdown Chart
const categoryData = {{ category_breakdown|safe }};

const categoryCtx = document.getElementById('categoryChart').getContext('2d');
const categoryChart = new Chart(categoryCtx, {
    type: 'pie',
    data: {
        labels: categoryData.map(item => item.category__name),
        datasets: [{
            data: categoryData.map(item => item.total),
            backgroundColor: ['#dc3545', '#fd7e14', '#ffc107', '#28a745', '#17a2b8', '#6f42c1', '#e83e8c']
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
            legend: {
                position: 'right'
            }
        }
    }
});
</script>
{% endblock %}
