{% extends 'tasks/base.html' %}

{% block title %}Delete Task - TaskManager{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0"><i class="fas fa-exclamation-triangle"></i> Delete Task</h3>
            </div>
            <div class="card-body text-center">
                <i class="fas fa-trash-alt fa-4x text-danger mb-3"></i>
                <h4>Are you sure you want to delete "{{ task.title }}"?</h4>
                <p class="text-muted">This action cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'tasks:task_detail' task.id %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger">Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
