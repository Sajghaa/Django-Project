{% extends 'base.html' %}

{% block title %}Home - Expense Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 text-center">
        <h1 class="display-4">Welcome to Expense Tracker</h1>
        <p class="lead">Track your expenses and manage your budget effectively.</p>
        
        {% if not user.is_authenticated %}
            <div class="mt-4">
                <a href="{% url 'admin:login' %}" class="btn btn-primary btn-lg">
                    Login to Get Started
                </a>
            </div>
        {% else %}
            <div class="mt-4">
                <a href="{% url 'dashboard' %}" class="btn btn-primary btn-lg">
                    Go to Dashboard
                </a>
            </div>
        {% endif %}
    </div>
</div>
{% endblock %}
