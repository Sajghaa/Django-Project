<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduManager - School Management System</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* Custom animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-up {
            animation: fadeInUp 0.6s ease-out;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #7c3aed, #db2777);
        }
        
        /* Glassmorphism effect */
        .glass {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Loading spinner */
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(139, 92, 246, 0.3);
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Card hover effect */
        .hover-lift {
            transition: all 0.3s ease;
        }
        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-800 min-h-screen">
    
    <!-- Navigation Bar -->
    <nav class="glass sticky top-0 z-50 border-b border-gray-700">
        <div class="container mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <!-- Logo -->
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-r from-purple-500 to-pink-500 flex items-center justify-center">
                        <i class="fas fa-graduation-cap text-white text-xl"></i>
                    </div>
                    <span class="text-xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                        EduManager
                    </span>
                </div>
                
                <!-- Desktop Navigation -->
                <div class="hidden md:flex items-center space-x-6" id="navMenu">
                    <a href="#" data-page="dashboard" class="nav-link text-gray-300 hover:text-purple-400 transition">Dashboard</a>
                    <a href="#" data-page="students" class="nav-link text-gray-300 hover:text-purple-400 transition">Students</a>
                    <a href="#" data-page="teachers" class="nav-link text-gray-300 hover:text-purple-400 transition">Teachers</a>
                    <a href="#" data-page="classes" class="nav-link text-gray-300 hover:text-purple-400 transition">Classes</a>
                    <a href="#" data-page="attendance" class="nav-link text-gray-300 hover:text-purple-400 transition">Attendance</a>
                </div>
                
                <!-- Auth Buttons / User Menu -->
                <div id="authButtons" class="flex space-x-3">
                    <button id="loginBtn" class="px-5 py-2 rounded-xl bg-purple-600 hover:bg-purple-700 transition shadow-lg">
                        <i class="fas fa-sign-in-alt mr-2"></i>Login
                    </button>
                    <button id="registerBtn" class="px-5 py-2 rounded-xl border border-purple-400 text-purple-400 hover:bg-purple-600/20 transition">
                        <i class="fas fa-user-plus mr-2"></i>Register
                    </button>
                </div>
                
                <div id="userMenu" class="hidden relative">
                    <button id="userMenuBtn" class="flex items-center space-x-3 px-4 py-2 rounded-xl bg-gray-700 hover:bg-gray-600 transition">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-r from-purple-500 to-pink-500 flex items-center justify-center">
                            <i class="fas fa-user text-white text-sm"></i>
                        </div>
                        <span id="username" class="text-gray-200"></span>
                        <i class="fas fa-chevron-down text-gray-400 text-xs"></i>
                    </button>
                    <div id="userDropdown" class="absolute right-0 mt-2 w-48 bg-gray-800 rounded-xl shadow-xl hidden z-50 overflow-hidden">
                        <a href="#" data-page="profile" class="dropdown-item block px-4 py-3 text-gray-300 hover:bg-gray-700 transition">
                            <i class="fas fa-user mr-2"></i>Profile
                        </a>
                        <hr class="border-gray-700">
                        <button id="logoutBtn" class="dropdown-item block w-full text-left px-4 py-3 text-red-400 hover:bg-gray-700 transition">
                            <i class="fas fa-sign-out-alt mr-2"></i>Logout
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-8">
        <div id="content">
            <!-- Dynamic content loads here -->
        </div>
    </main>

    <!-- Auth Modal -->
    <div id="authModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-gray-800 rounded-2xl w-full max-w-md p-6 relative animate-fade-up">
            <button id="closeModal" class="absolute top-4 right-4 text-gray-400 hover:text-white transition">
                <i class="fas fa-times text-xl"></i>
            </button>
            <div id="authForms">
                <!-- Login/Register forms dynamically loaded -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 bg-gray-800 rounded-xl shadow-2xl px-5 py-3 hidden z-50 animate-fade-up">
        <span id="toastMessage"></span>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="text-center">
            <div class="loader mx-auto mb-4"></div>
            <p class="text-gray-300">Loading...</p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/students.js"></script>
    <script src="js/teachers.js"></script>
    <script src="js/classes.js"></script>
    <script src="js/attendance.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
